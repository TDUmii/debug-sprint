name: Xuất bản Debug Sprint

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Đóng gói website
        uses: actions/upload-pages-artifact@v3
        with:
          path: static-site
      - name: Xuất bản
        id: deployment
        uses: actions/deploy-pages@v4
